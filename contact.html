<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpyGrowth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="shortcut icon" href="SPYGROWTH-logo2.png" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
<style>


/* HERO */

.contact-hero{
    padding:120px 0 80px;
    text-align:center;
}

.contact-hero .tag{
    display:inline-block;
    background:#EEF2FF;
    color:var(--primary);
    padding:10px 20px;
    border-radius:50px;
    margin-bottom:20px;
}

.contact-hero h1{
    font-size:60px;
    line-height:1.1;
    color:var(--dark);
    margin-bottom:20px;
}

.contact-hero p{
    max-width:700px;
    margin:auto;
    color:var(--text);
    font-size:18px;
}

/* CONTACT */

.contact-section{
    padding:80px 0;
}

.contact-section .container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:40px;
}

.contact-card,
.info-card{
    background:var(--white);
    padding:40px;
    border-radius:25px;
    border:1px solid var(--border);
}

.contact-card h2{
    font-size:32px;
    margin-bottom:15px;
}

.contact-card p{
    color:var(--text);
    margin-bottom:30px;
}

.input-group{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

input,
textarea{
    width:100%;
    padding:16px;
    margin-bottom:20px;
    border:1px solid var(--border);
    border-radius:15px;
    outline:none;
}

button{
    width:100%;
    border:none;
    background:var(--primary);
    color:white;
    padding:18px;
    border-radius:15px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.contact-right{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.info-card h3{
    margin-bottom:15px;
    color:var(--dark);
}

.info-card p{
    color:var(--text);
    line-height:1.7;
}

.info-card a{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:white;
    background:var(--primary);
    padding:14px 25px;
    border-radius:12px;
}

.info-card ul{
    list-style:none;
}

.info-card li{
    margin-bottom:15px;
    color:var(--text);
}

/* TABLET */

@media(max-width:992px){

.contact-hero h1{
    font-size:45px;
}

.contact-section .container{
    grid-template-columns:1fr;
}

}

/* MOBILE */

@media(max-width:768px){

.contact-hero{
    padding:80px 0 50px;
}

.contact-hero h1{
    font-size:36px;
}

.input-group{
    grid-template-columns:1fr;
}

.contact-card,
.info-card{
    padding:25px;
}

}


</style>
</head>

<body>

    <div id="header-container"></div>

<!-- CONTACT HERO -->
<section class="contact-hero">
    <div class="container">
        <div class="hero-content">
            <span class="tag">Contact Us</span>
            <h1>Let's Grow Your Business Together</h1>
            <p>
                Ready to scale your business? Get in touch and let's discuss
                how we can help you achieve your goals.
            </p>
        </div>
    </div>
</section>

<!-- CONTACT SECTION -->
<section class="contact-section">
    <div class="container">

        <!-- LEFT -->
        <div class="contact-left">

            <div class="contact-card">
                <h2>Send Us A Message</h2>
                <p>Fill out the form and we'll get back to you within 24 hours.</p>

                <form>
                    <div class="input-group">
                        <input type="text" placeholder="Full Name">
                        <input type="email" placeholder="Email Address">
                    </div>

                    <div class="input-group">
                        <input type="text" placeholder="Company Name">
                        <input type="text" placeholder="Phone Number">
                    </div>

                    <input type="text" placeholder="Website URL">

                    <textarea rows="6" placeholder="Tell us about your project"></textarea>

                    <button type="submit">Send Message</button>
                </form>
            </div>

        </div>

        <!-- RIGHT -->

         <!-- <div class="contact-right">

            <div class="info-card">
                <h3>Book A Free Strategy Call</h3>

                <p>
                    Schedule a free consultation and discover opportunities
                    to grow your brand online.
                </p>

                <a href="#">Schedule Call</a>
            </div>

            <div class="info-card">
                <h3>Work Directly With Experts</h3>

                <p>
                    Our experienced team is committed to helping businesses
                    achieve sustainable growth through proven strategies.
                </p>
            </div>

            <div class="info-card">
                <h3>Office Information</h3>

                <ul>
                    <li>San Diego, California</li>
                    <li>hello@youragency.com</li>
                    <li>+1 (000) 000-0000</li>
                    <li>Mon - Fri : 9AM - 6PM</li>
                </ul>
            </div>

        </div> -->

    </div>
</section>





    <div id="footer-container"></div>

    <script src="components.js"></script>


    <script src="script.js"></script>
</body>

</html>
